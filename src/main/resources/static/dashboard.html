<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background-color: #f8f9fa; }
    .diet-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 20px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-success mb-4">
  <div class="container">
    <span class="navbar-brand mb-0 h1">🥗 AI Diet Dashboard</span>
    <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
  </div>
</nav>

<div class="container">
  <h2 id="welcomeMsg" class="mb-4">Hello!</h2>

  <div class="row">
    <div class="col-md-4">
      <div class="card p-3 mb-3">
        <button onclick="generatePlan()" class="btn btn-primary w-100 mb-2">✨ Generate New Plan</button>
        <button onclick="loadHistory()" class="btn btn-outline-secondary w-100 mb-2">📂 Load History</button>
        <a href="chat.html" class="btn btn-success w-100">💬 Chat with AI</a>
      </div>
      <div id="loadingSpinner" style="display:none;" class="text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Thinking...</p>
      </div>
    </div>

    <div class="col-md-8">
      <div id="contentArea">
        <div class="alert alert-info">Click "Generate" to get a fresh diet plan!</div>
      </div>
    </div>
  </div>
</div>
<script>
  // 1. DECLARE CONSTANTS FIRST
  const API_BASE = '/api/diet';
  const username = sessionStorage.getItem('currentUser');

  // 2. DEFINE FUNCTIONS
  function logout() {
      sessionStorage.clear();
      window.location.href = 'index.html';
  }

  async function generatePlan() {
      showLoading(true);
      try {
          const response = await fetch(`${API_BASE}/generate?username=${username}`);
          const text = await response.text();
          renderCard("New Diet Plan", marked.parse(text), "Just Now");
      } catch (e) {
          alert("Error generating plan");
      } finally { showLoading(false); }
  }

  async function loadActivePlan() {
      showLoading(true);
      try {
          const response = await fetch(`${API_BASE}/active?username=${username}`);

          // If the backend returns 204 No Content (meaning they have no plans yet)
          if (response.status === 204) {
              document.getElementById('contentArea').innerHTML =
                  '<div class="alert alert-info">No active plan found. Click "Generate" to get started!</div>';
              return;
          }

          if (response.ok) {
              const plan = await response.json();
              const date = new Date(plan.createdAt).toLocaleString();

              // Clear the placeholder text
              document.getElementById('contentArea').innerHTML = '';

              // Render the active plan
              renderCard(
                  `✨ Current Active Plan`,
                  marked.parse(plan.planDetails),
                  `Target: ${plan.targetCalories || 'Custom'} kcal | Updated: ${date}`
              );
          }
      } catch (e) {
          console.error("Error loading active plan", e);
          document.getElementById('contentArea').innerHTML =
              '<div class="alert alert-danger">Error loading your active plan.</div>';
      } finally {
          showLoading(false);
      }
  }

  async function loadHistory() {
      showLoading(true);
      document.getElementById('contentArea').innerHTML = '';
      try {
          const response = await fetch(`${API_BASE}/history?username=${username}`);
          const plans = await response.json();

          if(plans.length === 0) {
               document.getElementById('contentArea').innerHTML = '<p>No history found.</p>';
               return;
          }

          plans.forEach(plan => {
              const date = new Date(plan.createdAt).toLocaleString();
              renderCard(`Plan from ${date}`, marked.parse(plan.planDetails), `Target: ${plan.targetCalories} kcal`);
          });
      } catch (e) {
          alert("Error loading history");
      } finally { showLoading(false); }
  }

  function renderCard(title, content, subtitle) {
      const div = document.createElement('div');
      div.className = 'diet-card';
      div.innerHTML = `<h5>${title} <small class="text-muted float-end">${subtitle}</small></h5><hr><div>${content}</div>`;

      // Add new card to top
      const area = document.getElementById('contentArea');
      if (area.innerHTML.includes('Click "Generate"')) area.innerHTML = '';
      area.prepend(div);
  }

  function showLoading(show) {
      document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
  }

  // 3. EXECUTE INITIALIZATION LOGIC LAST
  // Now that everything is defined, it is safe to run the startup checks.
  if (!username) {
      window.location.href = 'login.html';
  } else {
      document.getElementById('welcomeMsg').innerText = `Hello, ${username}!`;
      loadActivePlan();
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Diet - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .hero-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; max-width: 600px; }
        .btn-custom { padding: 12px 30px; border-radius: 50px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .btn-primary-custom { background: #ff7e5f; border: none; color: white; }
        .btn-primary-custom:hover { background: #feb47b; transform: translateY(-3px); }
        .btn-outline-light:hover { transform: translateY(-3px); color: #1e3c72; background: white; }
    </style>
</head>
<body>
<div class="hero-card">
    <h1 class="display-4 fw-bold mb-4">🥗 AI Nutritionist</h1>
    <p class="lead mb-5">Your personal diet plan, powered by Artificial Intelligence and biological science. Get a meal plan tailored exactly to your body.</p>
    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
        <a href="signup.html" class="btn btn-primary-custom btn-custom">Get Started</a>
        <a href="login.html" class="btn btn-outline-light btn-custom">Login</a>
    </div>
</div>
</body>
</html>
